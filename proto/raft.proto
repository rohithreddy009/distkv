syntax = "proto3";

package raftpb;

option go_package = "github.com/rohithreddy/distkv/proto/raftpb";

enum EntryType {
  ENTRY_NORMAL = 0;
  ENTRY_CONF_CHANGE = 1;
}

enum ConfChangeType {
  CONF_CHANGE_ADD_NODE = 0;
  CONF_CHANGE_REMOVE_NODE = 1;
  CONF_CHANGE_LEAVE_JOINT = 2;
}

message ConfChange {
  ConfChangeType type = 1;
  uint64 node_id = 2;
  bytes context = 3; // optional peer address (raft RPC)
}

// A single Raft log entry.
message Entry {
  uint64 term  = 1;
  uint64 index = 2;
  bytes  data  = 3; // serialized KV command (normal entries)
  EntryType type = 4;
  ConfChange conf_change = 5;
}

message RequestVoteRequest {
  uint64 term          = 1;
  uint64 candidate_id  = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term  = 4;
}

message RequestVoteResponse {
  uint64 term         = 1;
  bool   vote_granted = 2;
}

message AppendEntriesRequest {
  uint64 term           = 1;
  uint64 leader_id      = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term  = 4;
  repeated Entry entries = 5;
  uint64 leader_commit  = 6;
}

message AppendEntriesResponse {
  uint64 term    = 1;
  bool   success = 2;
  // Fast log backtracking hints (conflict term/index optimization).
  uint64 conflict_index = 3;
  uint64 conflict_term  = 4;
}

message InstallSnapshotRequest {
  uint64 term                = 1;
  uint64 leader_id           = 2;
  uint64 last_included_index = 3;
  uint64 last_included_term  = 4;
  bytes  data                = 5;
  bytes  conf_state          = 6;
}

message InstallSnapshotResponse {
  uint64 term = 1;
}

// ReadIndex is a quorum heartbeat used to confirm leadership before serving
// a linearizable read without writing to the log.
message ReadIndexRequest {
  uint64 term      = 1;
  uint64 leader_id = 2;
}

message ReadIndexResponse {
  uint64 term = 1;
  bool   ack  = 2;
}

service Raft {
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc InstallSnapshot(InstallSnapshotRequest) returns (InstallSnapshotResponse);
  rpc ReadIndex(ReadIndexRequest) returns (ReadIndexResponse);
}
