server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker embedded DNS — resolve upstream at request time so nginx
    # does not crash if webapi is briefly unavailable at startup.
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/ {
        set $webapi_upstream http://webapi:8080;
        proxy_pass $webapi_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
